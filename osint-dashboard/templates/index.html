{% extends "base.html" %}

{% block content %}

<form method="POST">
    <input type="text" name="domain" placeholder="Enter domain" required>
    <button type="submit">Analyze</button>
</form>

{% if data %}
<h2>Results for {{ data.domain }}</h2>

<h3>Subdomains</h3>
<ul>
    {% for sub in data.subdomains %}
    <li>{{ sub }}</li>
    {% endfor %}
</ul>

<h3>WHOIS</h3>
<pre>{{ data.whois }}</pre>

{% endif %}

{% endblock %}
